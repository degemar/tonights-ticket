<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
    <meta name="theme-color" content="#f6584f" />
    <meta name="description" content="A playful at-home plan lottery for parents who need an easy win tonight." />
    <title>Tonight's Ticket</title>
    <link rel="icon" href="assets/date-ticket.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero-band" aria-labelledby="app-title">
        <div class="brand-row">
          <img class="brand-ticket" src="assets/date-ticket.svg" alt="" />
          <div>
            <p class="eyebrow">At-home plan lottery</p>
            <h1 id="app-title">Tonight's Ticket</h1>
          </div>
        </div>

        <div class="hero-copy">
          <p>
            No booking, no shopping list, no heroic logistics.
          </p>
        </div>

        <div class="status-strip" id="syncStatus" aria-live="polite">Local mode ready</div>
      </section>

      <section class="control-band" aria-label="Lottery filters">
        <div class="mode-switch" role="group" aria-label="Choose who is joining">
          <button class="mode-card active" data-filter="kids" data-value="with-kids" type="button">
            <span class="mode-icon" aria-hidden="true">Family</span>
            <span>
              <span class="mode-title">With kids</span>
              <span class="mode-subtitle">Silly, easy, bedtime-friendly</span>
            </span>
          </button>
          <button class="mode-card" data-filter="kids" data-value="after-bed" type="button">
            <span class="mode-icon" aria-hidden="true">Date</span>
            <span>
              <span class="mode-title">Without kids</span>
              <span class="mode-subtitle">Quiet plans after bedtime</span>
            </span>
          </button>
        </div>

        <div class="segmented-control" role="group" aria-label="Time available">
          <button class="chip active" data-filter="time" data-value="any">Any time</button>
          <button class="chip" data-filter="time" data-value="quick">30 min</button>
          <button class="chip" data-filter="time" data-value="medium">1 hour</button>
        </div>

        <div class="segmented-control" role="group" aria-label="Energy level">
          <button class="chip active" data-filter="energy" data-value="any">Any energy</button>
          <button class="chip" data-filter="energy" data-value="low">Low</button>
          <button class="chip" data-filter="energy" data-value="medium">Medium</button>
        </div>
      </section>

      <section class="draw-band" aria-label="Choose a lottery number">
        <div class="section-head">
          <div>
            <p class="eyebrow" id="drawContext">With kids lottery</p>
            <h2 id="drawTitle">Family tickets</h2>
          </div>
          <button class="icon-button" id="randomButton" type="button" title="Draw a random ticket" aria-label="Draw a random ticket">
            <span aria-hidden="true">Draw</span>
          </button>
        </div>
        <div class="number-grid" id="numberGrid"></div>
      </section>

      <section class="winner-band" id="winnerBand" aria-live="polite">
        <div class="empty-winner">
          <p class="eyebrow">Tonight's plan</p>
          <h2>The ticket is waiting.</h2>
          <p>The first ticket gets all the ceremony.</p>
        </div>
      </section>

      <section class="lists-band">
        <article class="list-panel">
          <div class="section-head compact">
            <h2>Favorites</h2>
            <button class="text-button" id="clearFavoritesButton" type="button">Clear</button>
          </div>
          <div id="favoritesList" class="mini-list"></div>
        </article>

        <article class="list-panel">
          <div class="section-head compact">
            <h2>Recent Wins</h2>
            <button class="text-button" id="clearHistoryButton" type="button">Clear</button>
          </div>
          <div id="historyList" class="mini-list"></div>
        </article>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="src/config.js"></script>
    <script src="src/plans.js"></script>
    <script src="src/storage.js"></script>
    <script src="src/app.js"></script>
  </body>
</html>
